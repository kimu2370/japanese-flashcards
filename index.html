<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>いっぽいっぽ BASIC - Unit 03,04 단어카드</title>
<style>
  :root{
    --washi:#f4efe4;
    --washi-dark:#e8dfc9;
    --sumi:#2b2b28;
    --shu:#b5493a;      /* 붉은 인주색 */
    --ai:#33546b;        /* 쪽빛 */
    --gold:#a98a4a;
    --line:#cfc4a3;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{-webkit-text-size-adjust:100%;}
  body{
    margin:0;
    font-family:'Noto Sans KR','Malgun Gothic',sans-serif;
    background:
      radial-gradient(circle at 15% 20%, rgba(181,73,58,0.05), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(51,84,107,0.06), transparent 40%),
      var(--washi);
    color:var(--sumi);
    min-height:100vh;
    padding:18px 14px 48px;
    overscroll-behavior-y:contain;
  }
  .wrap{max-width:460px;margin:0 auto;}
  header{
    text-align:center;
    margin-bottom:16px;
  }
  .eyebrow{
    font-size:11px;
    letter-spacing:3px;
    color:var(--shu);
    font-weight:700;
  }
  h1{
    font-size:clamp(19px,5.5vw,22px);
    margin:6px 0 2px;
    letter-spacing:1px;
  }
  .sub{font-size:12.5px;color:#6b6355;line-height:1.4;}

  .unit-tabs{
    display:flex;
    justify-content:flex-start;
    gap:8px;
    margin:16px 0;
    flex-wrap:nowrap;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    padding-bottom:2px;
    scrollbar-width:none;
  }
  .unit-tabs::-webkit-scrollbar{display:none;}
  .unit-tab{
    flex:0 0 auto;
    padding:9px 16px;
    border:1px solid var(--line);
    border-radius:20px;
    background:#fff;
    font-size:13px;
    cursor:pointer;
    color:var(--sumi);
    transition:.15s;
    white-space:nowrap;
    -webkit-tap-highlight-color:transparent;
  }
  .unit-tab.active{
    background:var(--sumi);
    color:var(--washi);
    border-color:var(--sumi);
  }

  .progress-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    font-size:12px;
    color:#6b6355;
    margin:8px 4px 10px;
  }
  .progress-bar{
    height:4px;
    background:var(--washi-dark);
    border-radius:2px;
    overflow:hidden;
    margin:0 4px 18px;
  }
  .progress-fill{
    height:100%;
    background:var(--shu);
    width:0%;
    transition:width .25s ease;
  }

  .stage{
    perspective:1400px;
    margin-bottom:18px;
  }
  .card{
    position:relative;
    height:min(46vh,240px);
    min-height:200px;
    border-radius:14px;
    cursor:pointer;
    transform-style:preserve-3d;
    touch-action:manipulation;
  }
  .card.flipped{transform:rotateY(180deg);}
  .face{
    position:absolute;
    inset:0;
    border-radius:14px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    backface-visibility:hidden;
    box-shadow:0 6px 18px rgba(43,43,40,0.12);
    border:1px solid var(--line);
    padding:18px;
    text-align:center;
  }
  .front{background:#fffdf8;}
  .back{
    background:var(--sumi);
    color:var(--washi);
    transform:rotateY(180deg);
  }
  .kanji{
    font-size:clamp(34px,11vw,48px);
    font-weight:700;
    letter-spacing:1px;
    line-height:1.2;
    word-break:keep-all;
  }
  .yomi{
    margin-top:12px;
    font-size:clamp(15px,4.2vw,18px);
    color:var(--ai);
    font-weight:600;
  }
  .back .yomi{
    color:#f0d9a8;
  }
  .tag{
    position:absolute;
    top:12px;
    left:14px;
    font-size:10.5px;
    letter-spacing:2px;
    color:var(--gold);
    font-weight:700;
  }
  .hint{
    position:absolute;
    bottom:12px;
    font-size:10.5px;
    color:#a39a86;
  }
  .back .hint{color:#a89f8a;}
  .meaning{
    font-size:clamp(22px,7vw,28px);
    font-weight:700;
    word-break:keep-all;
  }
  .back .kor-yomi{
    margin-top:8px;
    font-size:clamp(13px,3.8vw,15px);
    color:#d9b98f;
    font-weight:500;
  }

  .controls{
    display:flex;
    justify-content:center;
    gap:8px;
    margin-top:4px;
  }
  button.nav{
    flex:1;
    border:none;
    background:#fff;
    border:1px solid var(--line);
    padding:13px 8px;
    border-radius:10px;
    font-size:14px;
    cursor:pointer;
    color:var(--sumi);
    transition:.15s;
    min-height:46px;
    -webkit-tap-highlight-color:transparent;
  }
  button.nav:active{background:var(--washi-dark);}
  button.nav.primary{
    background:var(--shu);
    border-color:var(--shu);
    color:#fff;
    flex:1.1;
  }
  button.nav.primary:active{background:#9c3f32;}
  button.nav:disabled{opacity:.35;cursor:default;}

  .toolbar{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:16px;
    font-size:13px;
  }
  .toolbar a{
    color:var(--ai);
    cursor:pointer;
    text-decoration:underline;
    text-underline-offset:3px;
    padding:6px 2px;
    -webkit-tap-highlight-color:transparent;
  }

  .list-view{
    margin-top:26px;
    border-top:1px dashed var(--line);
    padding-top:16px;
  }
  .list-scroll{
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
  }
  .list-view table{
    width:100%;
    min-width:340px;
    border-collapse:collapse;
    font-size:12.5px;
  }
  .list-view th{
    text-align:left;
    font-size:10px;
    letter-spacing:1px;
    color:var(--gold);
    padding:6px 6px;
    border-bottom:1px solid var(--line);
    white-space:nowrap;
  }
  .list-view td{
    padding:7px 6px;
    border-bottom:1px solid var(--washi-dark);
  }
  .list-view .kanji-cell{font-weight:700;font-size:14px;}
  .list-view .yomi-cell{color:var(--ai);}
  details summary{
    text-align:center;
    cursor:pointer;
    color:#6b6355;
    font-size:13px;
    margin-top:8px;
    list-style:none;
  }
  details summary::-webkit-details-marker{display:none;}
</style>
</head>

<div class="wrap">
  <header>
    <div class="eyebrow">いっぽいっぽ BASIC 1단계</div>
    <h1>단어 암기 카드</h1>
    <div class="sub">카드를 탭하면 뒤집혀요 · 한자 → 뜻 · 한글 발음 표기 포함</div>
  </header>

  <div class="unit-tabs" id="unitTabs"></div>

  <div class="progress-row">
    <span id="progressText">1 / 43</span>
    <span id="unitLabel">UNIT 03</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

  <div class="stage">
    <div class="card" id="card">
      <div class="face front">
        <div class="tag">뜻</div>
        <div class="meaning" id="frontMeaning">엔</div>
        <div class="hint">탭해서 일본어 보기</div>
      </div>
      <div class="face back">
        <div class="tag">にほんご</div>
        <div class="kanji" id="backKanji">円</div>
        <div class="yomi" id="backReading">えん</div>
        <div class="kor-yomi" id="backKorReading">(발음: 엔)</div>
        <div class="hint">다시 탭해서 앞면 보기</div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="nav" id="prevBtn">← 이전</button>
    <button class="nav primary" id="flipBtn">뒤집기</button>
    <button class="nav" id="nextBtn">다음 →</button>
  </div>

  <div class="toolbar">
    <a id="shuffleBtn">🔀 섞기</a>
    <a id="resetBtn">↺ 순서대로</a>
  </div>

  <details class="list-view">
    <summary>▾ 전체 단어 목록으로 보기</summary>
    <div class="list-scroll">
    <table id="listTable">
      <thead><tr><th>한자/단어</th><th>발음(가나)</th><th>한글 발음</th><th>뜻</th></tr></thead>
      <tbody id="listBody"></tbody>
    </table>
    </div>
  </details>
</div>

    ["28日","にじゅうはちにち","니쥬-하치니치","28일"],
    ["29日","にじゅうくにち","니쥬-쿠니치","29일"],
    ["30日","さんじゅうにち","산쥬-니치","30일"],

    ["何曜日","なんようび","낭요-비","무슨 요일"],

    ["週末","しゅうまつ","슈-마쯔","주말"]
  ]
};

let currentUnit = "Unit 1,2";
let order = [];
let idx = 0;
let flipped = false;

const unitTabs = document.getElementById('unitTabs');
Object.keys(data).forEach(u=>{
  const btn = document.createElement('div');
  btn.className = 'unit-tab' + (u===currentUnit?' active':'');
  btn.textContent = u;
  btn.onclick = ()=>{ currentUnit = u; resetOrder(); updateTabs(); render(); };
  btn.dataset.unit = u;
  unitTabs.appendChild(btn);
});

function updateTabs(){
  [...unitTabs.children].forEach(el=>{
    el.classList.toggle('active', el.dataset.unit===currentUnit);
  });
}

function resetOrder(){
  order = data[currentUnit].map((_,i)=>i);
  idx = 0;
  flipped = false;
}

function shuffleOrder(){
  for(let i=order.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [order[i],order[j]] = [order[j],order[i]];
  }
  idx = 0;
  flipped = false;
  render();
}

const card = document.getElementById('card');
const frontMeaning = document.getElementById('frontMeaning');
const backKanji = document.getElementById('backKanji');
const backReading = document.getElementById('backReading');
const backKorReading = document.getElementById('backKorReading');
const progressText = document.getElementById('progressText');
const progressFill = document.getElementById('progressFill');
const unitLabel = document.getElementById('unitLabel');

function render(){
  const list = data[currentUnit];
  const realIdx = order[idx];
  const [kanji, kana, kor, meaning] = list[realIdx];
  frontMeaning.textContent = meaning;
  backKanji.textContent = kanji;
  backReading.textContent = kana;
  backKorReading.textContent = `(발음: ${kor})`;
  card.classList.toggle('flipped', flipped);
  progressText.textContent = `${idx+1} / ${list.length}`;
  progressFill.style.width = `${((idx+1)/list.length)*100}%`;
  unitLabel.textContent = currentUnit;
  document.getElementById('prevBtn').disabled = idx===0;
  document.getElementById('nextBtn').disabled = idx===list.length-1;
  renderList();
}

function renderList(){
  const body = document.getElementById('listBody');
  body.innerHTML = '';
  data[currentUnit].forEach(([kanji,kana,kor,meaning])=>{
    const tr = document.createElement('tr');
    tr.innerHTML = `<td class="kanji-cell">${kanji}</td><td class="yomi-cell">${kana}</td><td>${kor}</td><td>${meaning}</td>`;
    body.appendChild(tr);
  });
}

card.addEventListener('click', ()=>{
  flipped = !flipped;
  card.classList.toggle('flipped', flipped);
});

document.getElementById('flipBtn').onclick = (e)=>{
  e.stopPropagation();
  flipped = !flipped;
  card.classList.toggle('flipped', flipped);
};

document.getElementById('prevBtn').onclick = ()=>{
  if(idx>0){ idx--; flipped=false; render(); }
};
document.getElementById('nextBtn').onclick = ()=>{
  if(idx<order.length-1){ idx++; flipped=false; render(); }
};
document.getElementById('shuffleBtn').onclick = shuffleOrder;
document.getElementById('resetBtn').onclick = ()=>{ resetOrder(); render(); };

resetOrder();
render();
</script>
</body>
</html>
